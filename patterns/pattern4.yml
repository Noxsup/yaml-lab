---
name: pattern practise 5

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: login to docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: myusername
          password: mypassword

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/myapp:latest
