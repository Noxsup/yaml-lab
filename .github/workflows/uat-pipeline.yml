---
name: UAT Deployment Pipeline
on:
  push:
    branches:
      - uat

env:
  IMAGE_NAME: myapp-uat
  REGISTRY: ghcr.io
  PHP_VERSION: '8.4'

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install PHP 8.4
        run: |
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y php8.4-cli php8.4-xml php8.4-curl php8.4-mbstring
      - name: Set PHP 8.4 as default
        run: |
          sudo update-alternatives --set php /usr/bin/php8.4
          php -version
      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Build Docker Image
        run: docker build -t ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:uat .
      - name: Push Docker Image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:uat .
