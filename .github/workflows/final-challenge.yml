---
name: Challenge pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: node-backend
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}

      - name: install dependecies
        run: npm ci

      - name: run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: login to resgistry
        uses: docker/login-action@v3
        with:
          registry: ${{env.REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: build docker image
        run: docker build . -t ${{env.REGISTRY}}/${{github.repository}}/${{env.IMAGE_NAME}}:${{github.sha}}

      - name: push docker image
        run: docker push ${{env.REGISTRY}}/${{github.repository}}/${{env.IMAGE_NAME}}:${{github.sha}}
