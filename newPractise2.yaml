---
trigger:
  branches:
    include:
      - main
      - staging

variables:
  nodeVersion: '18'
  appName: 'myapi'
  imageRepository: 'myapi'
  containerRegistry: 'ghcr.io'
  dockerfilePath: '$(Build.SourceDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'
  dockerRegistryServiceConnection: 'dockerhub-connection'

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: Build
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - script: npm install
            displayName: 'Install Dependencies'

          - script: node --version
            displayName: 'check node version'

  - stage: test
    displayName: 'Test stage'
    jobs:
      - job: testjob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - script: npm test
            displayName: 'run tests'
          - script: echo $(appName) tests complete
            displayName: 'test summary'

  - stage: package
    displayName: 'Package stage'
    jobs:
      - job: package_job
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - script: npm run build
            displayName: 'Build Application'
          - script: echo packaging complete
            displayName: 'package summary'

  - stage: deploy
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: deployjob
        displayName: 'Deploy Job'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - task: Docker@2
            displayName: 'Build and push docker image'
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              tag: $(tag)
