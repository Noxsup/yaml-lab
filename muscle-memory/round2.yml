---
trigger:
  branches:
    include:
      - main
      - develop

variables:
  appName: 'myapi'
  nodeVersion: '18'
  vmImageName: 'ubuntu-latest'


stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: build
        displayName: 'Build Job'
        pool:
          vmImage: 'ubuntu-latest'
          steps:
            - checkout: self
            - script: node --version
              displayName: 'Chceck Node Version'

            - script: npm install
              displayName: 'Install Dependenciea'

      - job: test
        displayName: 'Testjob'
        pool:
          vmImage: 'ubuntu-latest'
          steps:
            - checkout: self
            - script: npm test
              displayName: 'Run Tests'
            - script: echo "$(appName) version $(nodeVersion) tested"
              displayName: "Test summary"
