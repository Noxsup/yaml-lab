---
trigger:
  branches:
    include:
      - main
      - release/*

pr: none

variables:
  appName: 'payment-service'
  environment: 'staging'
  vmImageName: 'ubuntu-latest'
  nodeVersion: '18'
  imageRepository: 'payment-service'
  containerRegistry: 'mycompany.azurecr.io'
  dockerRegistryServiceConnection: 'AzureContainerRegistryConnection'
  tag: $(Build.BuildId)

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: Build
        displayName: BuildJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - script: node --version
            displayName: 'Verify node'
          - script: npm install
            displayName: 'Install dependencies'
          - script: npm run build
            displayName: 'Build application'
          - script: echo "$(appName) built for $(environment)"
            displayName: 'Build Summary'

  - stage: Test
    dependsOn: Build
    condition: succeeded()
    displayName: 'Test'
    jobs:
      - job: Test
        displayName: 'TestJob'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - script: npm test
            displayName: 'Run tests'
          - script: npm run lint
            displayName: 'Run linter'

  - stage: Deploy
    dependsOn: Test
    condition: succeeded()
    displayName: 'Deploy'
    jobs:
      - job: Deploy
        displayName: 'DeployJob'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: Docker@2
            displayName: 'Build and Push Docker Image'
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              tags: $(tag)
              command: buildAndPush
              dockerfile: $(dockerfilePath)

