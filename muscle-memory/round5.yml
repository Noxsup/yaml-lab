---
trigger:
  branches:
    include:
      - main
      - develop
      - release/*

pr: none

resources:
  repositories:
    - repository: self
      type: git

variables:
  appName: 'auth-service'
  environment: 'production'
  vmImageName: 'ubuntu-latest'
  nodeVersion: '20'
  phpVersion: '8.4'
  imageRepository: 'auth-service'
  containerRegistry: 'enterprise.azurecr.io'
  dockerRegistryServiceConnection: 'enterprise-acr-connection'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
  - stage: Validate
    displayName: 'Validate'
    jobs:
      - job: ValidateJob
        displayName: 'Validate Job'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self

          - script: node --version
            displayName: 'Check Node Version'

          - script: php --version
            displayName: 'Check PHP Version'

          - script: echo "Validating $(appName)"
            displayName: 'Validation Summary'

  - stage: Build
    displayName: 'Build'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: BuildJob
        displayName: 'Build Job'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self

          - script: npm install
            displayName: 'Install Node Dependencies'

          - script: composer install --no-interaction --prefer-dist
            displayName: 'Install PHP Dependencies'

          - script: npm run build
            displayName: 'Build Application'

          - script: echo "$(appName) built for $(environment)"
            displayName: 'Build Summary'

  - stage: Test
    displayName: 'Test'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: TestJob
        displayName: 'Test Job'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self

          - script: npm test
            displayName: 'Run Node Tests'

          - script: php artisan test
            displayName: 'Run PHP Tests'

          - script: npm run lint
            displayName: 'Run Linter'

          - script: echo "All tests passed for $(appName)"
            displayName: 'Test Summary'

  - stage: Deploy
    displayName: 'Deploy'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: DeployJob
        displayName: 'Deploy Job'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Build and Push to ACR'
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              command: buildAndPush
              dockerfile: $(dockerfilePath)
              tags: |
                $(tag)
                latest
